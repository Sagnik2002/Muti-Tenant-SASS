apiVersion: v1
kind: Service
metadata:
  name: {{ include "saas-workspace.fullname" . }}-frontend
  labels:
    {{- include "saas-workspace.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  selector:
    app: frontend
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: {{ .Values.service.frontend.port }}
