apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "saas-workspace.fullname" . }}-backend
  labels:
    {{- include "saas-workspace.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.backend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "saas-workspace.fullname" . }}-config
            - secretRef:
                name: {{ include "saas-workspace.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
