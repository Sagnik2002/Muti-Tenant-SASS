apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "saas-workspace.fullname" . }}-frontend
  labels:
    {{- include "saas-workspace.labels" . | nindent 4 }}
    app: frontend
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.frontend.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
